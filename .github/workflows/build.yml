name: Build Binaries

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # 手動実行用

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: oshirase-mcp-win-x64.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: oshirase-mcp-linux-x64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: oshirase-mcp-macos-x64
          - os: macos-14 # Apple Silicon (M1/M2)
            target: aarch64-apple-darwin
            artifact_name: oshirase-mcp-macos-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        # working-directoryを削除し、Cargo.tomlがあるルート階層で正しくビルドします
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename artifact (Windows)
        if: matrix.os == 'windows-latest'
        # 実際の出力ファイル名「oshirase-mcp.exe」を正確に指定してリネームします
        run: move target\${{ matrix.target }}\release\oshirase-mcp.exe target\${{ matrix.target }}\release\${{ matrix.artifact_name }}
        shell: cmd

      - name: Rename artifact (Unix)
        if: matrix.os != 'windows-latest'
        # 実際の出力ファイル名「oshirase-mcp」を正確に指定してリネームします
        run: mv target/${{ matrix.target }}/release/oshirase-mcp target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
